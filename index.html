<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exploding Kittens - Edizione Completa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght=700;900&display=swap');

        :root {
            --table-bg: radial-gradient(circle at center, #1b5e20, #0a3d0a);
            --card-w: 100px;
            --card-h: 150px;
            --text-color: white;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--table-bg);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* STILE PULSANTE EXIT GRIGIO SCURO INTEGRATO */
        .exit-button {
            position: absolute;
            top: 10px;
            left: 15px;
            font-size: 2rem;
            line-height: 1;
            color: #333; /* Grigio scuro discreto */
            text-decoration: none;
            z-index: 2001;
            transition: all 0.2s ease;
            font-family: Arial, sans-serif;
        }
        .exit-button:hover {
            color: var(--text-color); /* Si illumina al passaggio */
            transform: scale(1.1);
        }

        /* Top Bar */
        #stats-bar {
            background: rgba(0,0,0,0.85);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Fredoka One', cursive;
            border-bottom: 2px solid #f1c40f;
            z-index: 1000;
        }

        /* Tavolo da gioco */
        #game-table {
            flex: 1; display: grid;
            grid-template-columns: 140px 1fr 140px;
            grid-template-rows: 120px 1fr 220px;
            gap: 10px; padding: 10px;
            position: relative;
        }

        .player-area {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.15); border-radius: 15px; position: relative;
        }

        #area-bot2 { grid-column: 2; grid-row: 1; }
        #area-bot1 { grid-column: 1; grid-row: 2; }
        #area-bot3 { grid-column: 3; grid-row: 2; }
        
        #area-player {
            grid-column: 1 / span 3; grid-row: 3;
            background: rgba(0,0,0,0.3); border-top: 3px solid rgba(255,255,255,0.1);
            overflow: visible; display: flex; flex-direction: column;
        }

        .player-info {
            font-family: 'Fredoka One', cursive; font-size: 1rem; margin: 5px 0; text-align: center; z-index: 50;
        }
        .active-turn { color: #f1c40f; text-shadow: 0 0 10px #f1c40f; transform: scale(1.1); }

        /* Centro Tavola */
        #center-board {
            grid-column: 2; grid-row: 2;
            display: flex; justify-content: center; align-items: center; gap: 40px;
        }

        /* --- STILE CARTE --- */
        .card {
            width: var(--card-w); height: var(--card-h);
            background: #fff; border-radius: 12px; border: 4px solid #fff;
            color: #333; display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 8px; box-shadow: 0 6px 12px rgba(0,0,0,0.5);
            transition: all 0.2s ease; cursor: pointer; position: relative;
        }

        .card-icon { font-size: 2.5rem; line-height: 1; }
        .card-title { font-size: 0.7rem; font-weight: 900; text-transform: uppercase; text-align: center; }
        .card-desc { font-size: 0.5rem; text-align: center; color: #444; font-weight: 800; line-height: 1; }

        /* Colori Carte */
        .card.bomba { border-color: #c0392b; background: #ff7675; color: white; }
        .card.bomba .card-desc { color: #ffeaa7; }
        .card.disinnesco { border-color: #27ae60; background: #55efc4; }
        .card.nope { border-color: #2c3e50; background: #636e72; color: white; }
        .card.nope .card-desc { color: #dfe6e9; }
        .card.attacco { border-color: #d35400; background: #fab1a0; }
        .card.salta { border-color: #2980b9; background: #74b9ff; }
        .card.mischia { border-color: #8e44ad; background: #cd84f1; }
        .card.prevedi { border-color: #f39c12; background: #ffcccc; }
        .card.favore { border-color: #16a085; background: #a8e6cf; }

        .card.hidden { background: repeating-linear-gradient(45deg, #c0392b, #c0392b 8px, #e74c3c 8px, #e74c3c 16px); border-color: #fff; }
        .card.hidden::after { content: '💣'; font-size: 2.5rem; background: white; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }

        /* Mano Giocatore */
        #player-hand-container { position: relative; width: 100%; height: 160px; margin-top: auto; display: flex; justify-content: center; }
        .card-wrapper { position: absolute; bottom: 20px; transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); transform-origin: bottom center; }
        .card-wrapper:hover { z-index: 500 !important; }
        .card-wrapper:hover .card { transform: translateY(-60px) scale(1.3) rotate(0deg); box-shadow: 0 20px 40px rgba(0,0,0,0.8); border-color: #f1c40f; }

        /* Bot */
        .bot-hand { display: flex; justify-content: center; width: 100%; }
        .bot-hand .card { width: 35px; height: 50px; margin-left: -15px; border-width: 1px; padding: 2px; }
        .bot-hand .card::after { font-size: 1rem; width: 20px; height: 20px; }

        /* Notifiche & Modali */
        #notification {
            position: fixed; top: 15%; left: 50%; transform: translate(-50%, -20px);
            background: rgba(0,0,0,0.9); padding: 15px 40px; border-radius: 40px;
            border: 2px solid #f1c40f; color: white; font-weight: bold; font-size: 1.2rem;
            z-index: 2000; opacity: 0; pointer-events: none; transition: 0.3s; text-align: center;
        }
        #notification.show { opacity: 1; transform: translate(-50%, 0); }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 3000;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: #2c3e50; padding: 30px; border-radius: 20px; text-align: center;
            border: 4px solid #f1c40f; max-width: 90%;
        }
        .modal-content h2 { font-family: 'Fredoka One'; color: #f1c40f; margin-bottom: 15px; }
        
        .btn {
            background: #f1c40f; color: black; border: none; padding: 10px 20px; font-size: 1rem;
            font-family: 'Fredoka One'; cursor: pointer; border-radius: 8px; margin: 5px; transition: 0.2s;
        }
        .btn:hover { background: #f39c12; transform: scale(1.05); }

        .future-cards-container { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
        .future-cards-container .card { transform: scale(0.9); cursor: default; }
        .future-cards-container .card:hover { transform: scale(0.9); box-shadow: none; }

        /* Adattamento Layout Responsive per la X in alto */
        @media (max-width: 600px) {
            #stats-bar { padding-left: 50px; } /* Evita che il testo si sovrapponga alla X */
        }
    </style>
</head>
<body>

    <a href="https://mastersabba.github.io/MasterSabba/" class="exit-button" title="Torna all'Hub">×</a>

    <div id="stats-bar">
        <div>🏆 Vittorie: <span id="wins">0</span></div>
        <div id="game-status">Caricamento...</div>
        <button class="btn" onclick="initGame()">RESET</button>
    </div>

    <div id="notification"></div>

    <div id="game-table">
        <div class="player-area" id="area-bot1"><div class="player-info" id="name-bot1">Bot Ovest</div><div class="bot-hand" id="hand-bot1"></div></div>
        <div class="player-area" id="area-bot2"><div class="player-info" id="name-bot2">Bot Nord</div><div class="bot-hand" id="hand-bot2"></div></div>
        <div class="player-area" id="area-bot3"><div class="player-info" id="name-bot3">Bot Est</div><div class="bot-hand" id="hand-bot3"></div></div>

        <div id="center-board">
            <div id="deck" class="card hidden" onclick="drawCard(0)">
                <div id="deck-count" style="position:absolute; bottom:-35px; background:black; padding:2px 10px; border-radius:10px;">0</div>
            </div>
            <div id="discard-pile" style="width:100px; height:150px; border:3px dashed rgba(255,255,255,0.2); border-radius:12px; position:relative;"></div>
        </div>

        <div class="player-area" id="area-player">
            <div class="player-info" id="name-player">IL TUO TURNO</div>
            <div id="player-hand-container"></div>
        </div>
    </div>

    <div id="modal-bomb" class="modal-overlay">
        <div class="modal-content">
            <h2>💣 BOMBA DISINNESCATA!</h2>
            <p style="margin-bottom: 20px;">Dove vuoi reinserire la bomba nel mazzo?</p>
            <button class="btn" onclick="placeBombHuman('top')">In Cima (La pesca il prossimo)</button><br>
            <button class="btn" onclick="placeBombHuman('random')">Posizione Casuale</button><br>
            <button class="btn" onclick="placeBombHuman('bottom')">In Fondo al Mazzo</button>
        </div>
    </div>

    <div id="modal-future" class="modal-overlay">
        <div class="modal-content">
            <h2>🔮 IL FUTURO</h2>
            <p>Ecco le prime 3 carte del mazzo (La prima a sinistra è la cima):</p>
            <div id="future-cards" class="future-cards-container"></div>
            <button class="btn" onclick="closeFutureModal()">Ho capito</button>
        </div>
    </div>

    <script>
        const CARD_TYPES = {
            BOMBA: { id: 'bomba', icon: '😿', title: 'Bomba', desc: 'Esplodi!' },
            DISINNESCO: { id: 'disinnesco', icon: '🛠️', title: 'Disinnesco', desc: 'Salvati e riposiziona la bomba.' },
            ATTACCO: { id: 'attacco', icon: '⚔️', title: 'Attacco', desc: 'Finisci il turno. Il prossimo fa 2 turni.' },
            SALTA: { id: 'salta', icon: '⏭️', title: 'Salta', desc: 'Finisci il turno senza pescare.' },
            NOPE: { id: 'nope', icon: '🙅‍♂️', title: 'NO!', desc: 'Annulla un\'azione.' },
            MISCHIA: { id: 'mischia', icon: '🔀', title: 'Mischia', desc: 'Mischia il mazzo.' },
            PREVEDI: { id: 'prevedi', icon: '🔮', title: 'Prevedi', desc: 'Guarda le prime 3 carte del mazzo.' },
            FAVORE: { id: 'favore', icon: '🎁', title: 'Favore', desc: 'Ruba 1 carta a caso a un giocatore.' }
        };

        let deck = [];
        let players = [];
        let currentPlayer = 0;
        let gameActive = false;
        let pendingBomb = null; 
        let turnsToTake = 1;
        
        // Struttura di controllo per la finestra temporale del NOPE
        let nopeTimeout = null;
        let activeAction = null;

        let winCount = parseInt(localStorage.getItem('ek_wins')) || 0;
        document.getElementById('wins').innerText = winCount;

        function initGame() {
            if(nopeTimeout) clearTimeout(nopeTimeout);
            document.getElementById('modal-bomb').classList.remove('active');
            document.getElementById('modal-future').classList.remove('active');
            deck = [];
            activeAction = null;
            
            const addCards = (type, count) => { for(let i=0; i<count; i++) deck.push({...type}); };
            addCards(CARD_TYPES.ATTACCO, 4);
            addCards(CARD_TYPES.SALTA, 4);
            addCards(CARD_TYPES.NOPE, 5);
            addCards(CARD_TYPES.MISCHIA, 4);
            addCards(CARD_TYPES.PREVEDI, 5);
            addCards(CARD_TYPES.FAVORE, 4);
            
            deck.sort(() => Math.random() - 0.5);

            players = [
                { name: 'Tu', hand: [{...CARD_TYPES.DISINNESCO}], isBot: false, alive: true },
                { name: 'Bot Ovest', hand: [{...CARD_TYPES.DISINNESCO}], isBot: true, alive: true },
                { name: 'Bot Nord', hand: [{...CARD_TYPES.DISINNESCO}], isBot: true, alive: true },
                { name: 'Bot Est', hand: [{...CARD_TYPES.DISINNESCO}], isBot: true, alive: true }
            ];

            players.forEach(p => { for(let i=0; i<4; i++) p.hand.push(deck.pop()); });

            addCards(CARD_TYPES.BOMBA, 3);
            deck.sort(() => Math.random() - 0.5);

            currentPlayer = 0;
            turnsToTake = 1;
            gameActive = true;
            document.getElementById('discard-pile').innerHTML = '';
            notify("Mazzo mischiato. Tocca a te!");
            render();
        }

        function render() {
            const container = document.getElementById('player-hand-container');
            container.innerHTML = '';
            const myHand = players[0].hand;
            
            const spacing = Math.min(80, (window.innerWidth - 100) / (myHand.length || 1));
            const totalWidth = (myHand.length - 1) * spacing;

            myHand.forEach((card, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'card-wrapper';
                const xPos = (i * spacing) - (totalWidth / 2);
                const angle = (i - (myHand.length - 1) / 2) * 5;
                wrapper.style.transform = `translateX(${xPos}px) rotate(${angle}deg)`;
                wrapper.style.zIndex = i;

                const cardEl = document.createElement('div');
                cardEl.className = `card ${card.id}`;
                cardEl.innerHTML = `<div class="card-title">${card.title}</div><div class="card-icon">${card.icon}</div><div class="card-desc">${card.desc}</div>`;
                
                // Se c'è un'azione bloccabile in corso e hai un NOPE, puoi usarlo istantaneamente fuori dal tuo turno
                cardEl.onclick = (e) => { 
                    e.stopPropagation(); 
                    if(card.id === 'nope' && activeAction && activeAction.pIdx !== 0) {
                        playNope(0, i);
                    } else {
                        playCard(0, i); 
                    }
                };
                
                wrapper.appendChild(cardEl);
                container.appendChild(wrapper);
            });

            for(let i=1; i<=3; i++) {
                const botHand = document.getElementById(`hand-bot${i}`);
                const botName = document.getElementById(`name-bot${i}`);
                botHand.innerHTML = '';
                
                if(!players[i].alive) {
                    botName.innerHTML = `<del>${players[i].name}</del> 💥`;
                    botName.classList.remove('active-turn');
                    continue;
                }

                players[i].hand.forEach(() => {
                    const c = document.createElement('div');
                    c.className = 'card hidden';
                    botHand.appendChild(c);
                });
                botName.innerText = `${players[i].name} (${players[i].hand.length})`;
                botName.classList.toggle('active-turn', currentPlayer === i);
            }

            document.getElementById('name-player').innerText = turnsToTake > 1 ? `IL TUO TURNO (${turnsToTake}x)` : "IL TUO TURNO";
            document.getElementById('name-player').classList.toggle('active-turn', currentPlayer === 0);
            document.getElementById('deck-count').innerText = `${deck.length}`;
            
            let status = currentPlayer === 0 ? "Tocca a te!" : `Turno di ${players[currentPlayer].name}`;
            if(activeAction) status = `In attesa del NOPE su ${players[activeAction.pIdx].name}...`;
            document.getElementById('game-status').innerText = status;
        }

        function playCard(pIdx, cIdx) {
            if(!gameActive || currentPlayer !== pIdx || activeAction) return;
            const p = players[pIdx];
            const card = p.hand[cIdx];

            if(card.id === 'bomba' || card.id === 'disinnesco') {
                if(pIdx===0) notify("Non puoi giocare questa carta direttamente.");
                return;
            }

            p.hand.splice(cIdx, 1);
            showDiscardPile(card);

            if(card.id === 'nope') {
                notify(`${p.name} ha sprecato un NOPE senza azioni in corso!`);
                render();
                if(pIdx !== 0) setTimeout(botLogic, 1200);
                return;
            }

            // Innesca la finestra temporale per permettere la risposta del NOPE
            activeAction = { pIdx, card, cIdx };
            notify(`${p.name} gioca ${card.title}. Qualcuno dice NOPE?`);
            render();

            nopeTimeout = setTimeout(() => {
                checkBotNopeResponse();
            }, 2000);
        }

        function showDiscardPile(card) {
            document.getElementById('discard-pile').innerHTML = `<div class="card ${card.id}" style="transform: scale(0.9) rotate(${Math.random()*20-10}deg)">
                <div class="card-title">${card.title}</div><div class="card-icon">${card.icon}</div>
            </div>`;
        }

        // Gestione quando qualcuno gioca un NOPE valido
        function playNope(nopePlayerIdx, nopeCardIdx) {
            if(nopeTimeout) clearTimeout(nopeTimeout);
            
            const nPlayer = players[nopePlayerIdx];
            const card = nPlayer.hand.splice(nopeCardIdx, 1)[0];
            showDiscardPile(card);
            
            notify(`🙅‍♂️ ${nPlayer.name} urla NOPE! L'azione di ${players[activeAction.pIdx].name} è ANNULLATA!`);
            
            activeAction = null;
            render();

            // Ripristina il flusso regolare
            if(players[currentPlayer].isBot) {
                setTimeout(botLogic, 1500);
            }
        }

        // I bot controllano se vogliono e possono annullare la carta giocata
        function checkBotNopeResponse() {
            // Se l'azione è del giocatore umano, i bot vivi potrebbero voler giocare un NOPE (50% di chance se lo possiedono)
            if(activeAction.pIdx === 0) {
                for (let i = 1; i < players.length; i++) {
                    if(players[i].alive) {
                        const nopeIdx = players[i].hand.findIndex(c => c.id === 'nope');
                        if(nopeIdx > -1 && Math.random() < 0.5) {
                            playNope(i, nopeIdx);
                            return;
                        }
                    }
                }
            } 
            // Se nessun bot risponde (o l'azione era del bot stesso), l'effetto si risolve
            executeActiveEffect();
        }

        function executeActiveEffect() {
            const action = activeAction;
            activeAction = null; 
            const pIdx = action.pIdx;
            const p = players[pIdx];
            const card = action.card;

            if(card.id === 'mischia') {
                deck.sort(() => Math.random() - 0.5);
                notify(`🔀 Il mazzo è stato mischiato!`);
                render();
                if(pIdx !== 0) setTimeout(botLogic, 1200);
            } 
            else if(card.id === 'prevedi') {
                if(pIdx === 0) {
                    // Cima del mazzo corrisponde agli ultimi elementi dell'array
                    let top3 = deck.slice(-3).reverse(); 
                    const fCont = document.getElementById('future-cards');
                    fCont.innerHTML = '';
                    top3.forEach(c => {
                        fCont.innerHTML += `<div class="card ${c.id}"><div class="card-title">${c.title}</div><div class="card-icon">${c.icon}</div></div>`;
                    });
                    document.getElementById('modal-future').classList.add('active');
                } else {
                    notify(`🔮 ${p.name} ha visto il futuro...`);
                    render();
                    setTimeout(botLogic, 1200);
                }
            }
            else if(card.id === 'favore') {
                let targets = players.filter((pl, idx) => idx !== pIdx && pl.alive && pl.hand.length > 0);
                if(targets.length > 0) {
                    let target = targets[Math.floor(Math.random() * targets.length)];
                    let stolenIdx = Math.floor(Math.random() * target.hand.length);
                    let stolenCard = target.hand.splice(stolenIdx, 1)[0];
                    p.hand.push(stolenCard);
                    notify(`🎁 ${p.name} ha rubato una carta a ${target.name}!`);
                } else {
                    notify("Nessuno ha carte da dare.");
                }
                render();
                if(pIdx !== 0) setTimeout(botLogic, 1200);
            }
            else if(card.id === 'salta') {
                turnsToTake--;
                if(turnsToTake > 0) {
                    notify(`⏭️ ${p.name} salta 1 turno obbligatorio!`);
                    render();
                    if(pIdx !== 0) setTimeout(botLogic, 1000);
                } else {
                    notify(`⏭️ ${p.name} finisce il suo turno!`);
                    nextTurn();
                }
            } 
            else if(card.id === 'attacco') {
                turnsToTake = 0; 
                let nextP = getNextAlivePlayer(pIdx);
                currentPlayer = nextP;
                turnsToTake = 2; 
                notify(`⚔️ Tocca a ${players[nextP].name} con 2 turni!`);
                render();
                if(players[currentPlayer].isBot) setTimeout(botLogic, 1500);
            }
        }

        function closeFutureModal() {
            document.getElementById('modal-future').classList.remove('active');
            // Prosegui la logica del giocatore dopo aver chiuso il popup del futuro
            render();
        }

        function drawCard(pIdx) {
            // Impedisce di pescare se non è il proprio turno o se c'è un NOPE pendente
            if(!gameActive || currentPlayer !== pIdx || activeAction) return;
            const p = players[pIdx];
            const card = deck.pop();
            
            if(card.id === 'bomba') {
                const defuseIdx = p.hand.findIndex(c => c.id === 'disinnesco');
                if(defuseIdx > -1) {
                    p.hand.splice(defuseIdx, 1);
                    document.getElementById('discard-pile').innerHTML = `<div class="card disinnesco" style="transform: scale(0.9) rotate(5deg)"><div class="card-icon">🛠️</div></div>`;
                    
                    if(pIdx === 0) {
                        pendingBomb = card;
                        document.getElementById('modal-bomb').classList.add('active');
                    } else {
                        notify(`🛠️ ${p.name} DISINNESCA LA BOMBA e la nasconde...`);
                        setTimeout(() => {
                            let pos = Math.floor(Math.random() * (deck.length + 1));
                            deck.splice(pos, 0, card);
                            finalizeDraw(pIdx);
                        }, 2000);
                    }
                } else {
                    p.alive = false;
                    notify(`💥 ${p.name} È ESPLOSO!`, "danger");
                    p.hand = [];
                    if(pIdx === 0) gameActive = false;
                    
                    checkGameOver();
                    if(gameActive) { turnsToTake = 1; nextTurn(); }
                }
            } else {
                p.hand.push(card);
                notify(`${p.name} pesca una carta.`);
                finalizeDraw(pIdx);
            }
        }

        function placeBombHuman(choice) {
            document.getElementById('modal-bomb').classList.remove('active');
            let pos;
            if(choice === 'top') pos = deck.length; 
            else if(choice === 'bottom') pos = 0;   
            else pos = Math.floor(Math.random() * (deck.length + 1));
            
            deck.splice(pos, 0, pendingBomb);
            pendingBomb = null;
            notify("Bomba riposizionata segretamente.");
            finalizeDraw(0);
        }

        function finalizeDraw(pIdx) {
            turnsToTake--;
            if(turnsToTake > 0) {
                notify(`${players[pIdx].name} deve fare un altro turno.`);
                render();
                if(players[pIdx].isBot) setTimeout(botLogic, 1500);
            } else {
                turnsToTake = 1;
                nextTurn();
            }
        }

        function getNextAlivePlayer(curr) {
            let next = (curr + 1) % 4;
            while (!players[next].alive) { next = (next + 1) % 4; }
            return next;
        }

        function nextTurn() {
            currentPlayer = getNextAlivePlayer(currentPlayer);
            render();
            if(players[currentPlayer].isBot && gameActive) setTimeout(botLogic, 1500);
        }

        function botLogic() {
            if(!gameActive || activeAction) return;
            const bot = players[currentPlayer];
            
            let playChance = deck.length < 10 ? 0.7 : 0.4;
            const playableIdx = bot.hand.findIndex(c => c.id !== 'disinnesco' && c.id !== 'bomba' && c.id !== 'nope');
            
            if(playableIdx > -1 && Math.random() < playChance) {
                playCard(currentPlayer, playableIdx);
            } else {
                drawCard(currentPlayer);
            }
        }

        function notify(msg, type='normal') {
            const n = document.getElementById('notification');
            n.innerText = msg;
            n.style.borderColor = type === 'danger' ? '#e74c3c' : '#f1c40f';
            n.classList.add('show');
            setTimeout(() => n.classList.remove('show'), 2200);
        }

        function checkGameOver() {
            const alive = players.filter(p => p.alive);
            if(alive.length === 1) {
                gameActive = false;
                if(alive[0].isBot) {
                    notify(`💀 HAI PERSO! Il vincitore è ${alive[0].name}`);
                } else {
                    notify(`🏆 HAI VINTO! COMPLIMENTI!`);
                    winCount++;
                    localStorage.setItem('ek_wins', winCount);
                    document.getElementById('wins').innerText = winCount;
                }
            }
            render();
        }

        window.onload = initGame;
    </script>
</body>
</html>
